<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Web (AI Edition)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(11, 20, 26, 0.2); border-radius: 4px; }
    .chat-bg {
      background-color: #efeae2;
      background-image: url("https://static.whatsapp.net/rsrc.php/v3/yl/r/gi_DckOUM5a.png");
      background-repeat: repeat;
    }
  </style>
</head>
<body class="bg-[#dadbd3] font-sans text-gray-900 h-screen overflow-hidden flex items-center justify-center">

  <div id="app" class="w-full h-full md:h-[95vh] md:w-[95vw] lg:w-[90vw] xl:w-[80vw] md:rounded-lg md:shadow-2xl bg-white flex overflow-hidden relative">
    
    <div id="left-panel" class="w-full md:w-[350px] bg-white border-r border-gray-300 flex flex-col">
      <div class="bg-[#f0f2f5] h-16 flex items-center justify-between px-4 border-b border-gray-300">
        <div class="w-10 h-10 rounded-full bg-gray-300 overflow-hidden">
          <img src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="Профиль">
        </div>
      </div>
      <div id="chats-list-container" class="flex-1 overflow-y-auto bg-white"></div>
    </div>

    <div id="right-panel" class="flex-1 flex flex-col bg-[#efeae2]">
      <div id="chat-active-window" class="flex-1 flex flex-col h-full relative">

        <div class="bg-[#f0f2f5] px-4 py-3 flex items-end gap-2 z-10">
          <textarea id="message-input" rows="1" class="w-full py-2.5 px-3 outline-none rounded-lg text-[15px] resize-none" placeholder="Введите сообщение"></textarea>
          <button id="send-btn" class="bg-[#00a884] text-white p-2.5 rounded-full hover:bg-[#008f6f]">
            <i data-lucide="send" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
